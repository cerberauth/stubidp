name: Release Docker

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  release-docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      matrix:
        include:
          - registry: ghcr.io
            image: ghcr.io/${{ github.repository }}
          - registry: docker.io
            image: ${{ github.repository }}

    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v6

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: matrix.registry == 'ghcr.io'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: matrix.registry == 'docker.io'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ matrix.image }}:${{ inputs.version }},${{ matrix.image }}:latest
          cache-from: type=registry,ref=${{ matrix.image }}:${{ inputs.version }}
          cache-to: type=inline

      - name: Sign image
        run: cosign sign --yes ${{ matrix.image }}@${{ steps.push.outputs.digest }}
