name: ci

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Build and Test 🏗
        uses: cerberauth/ci/actions/node-build-test@main
        with:
          node-version-file: .nvmrc

      - name: Build TypeScript 🔨
        run: npm run build

  migrations:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      matrix:
        dialect: [sqlite, postgresql]
      fail-fast: false

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stubidp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v6

      - name: Setup node env 🏗
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version-file: '.nvmrc'

      - name: Install dependencies 👨🏻‍💻
        run: npm ci

      - name: Generate migrations 🗃️
        run: npm run db:generate
        env:
          DATABASE_DIALECT: ${{ matrix.dialect }}
          DATABASE_URL: ${{ matrix.dialect == 'postgresql' && 'postgresql://postgres:postgres@localhost:5432/stubidp' || '' }}

  docker-lint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Lint Dockerfile 🐳
        uses: cerberauth/ci/actions/docker-lint@main

  release:
    needs: [build, migrations, docker-lint]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      packages: write

    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - run: git fetch --force --tags

      - name: Setup node env 🏗
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version-file: '.nvmrc'

      - name: Install dependencies 👨🏻‍💻
        run: npm ci

      - name: Setup Bun 🥟
        uses: oven-sh/setup-bun@v2

      - name: Release 🚀
        uses: cerberauth/ci/actions/releaser@main
        with:
          setup-go: 'false'
          package-name: stubidp
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
          snapcraft-store-credentials: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          chocolatey-api-key: ${{ secrets.CHOCOLATEY_API_KEY }}
          aur-key: ${{ secrets.AUR_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/')
    uses: cerberauth/ci/.github/workflows/npm-publish.yml@main
    with:
      node-version-file: .nvmrc
      build-command: 'npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version'
      publish-github: true
    secrets:
      npm-token: ${{ secrets.NPM_TOKEN }}
      github-token: ${{ secrets.GITHUB_TOKEN }}
