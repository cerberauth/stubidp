name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Build and Test 🏗
        uses: cerberauth/ci/actions/node-build-test@main
        with:
          node-version-file: .nvmrc

      - name: Build TypeScript 🔨
        run: npm run build

  migrations:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      matrix:
        dialect: [sqlite, postgresql]
      fail-fast: false

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stubidp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v6

      - name: Setup node env 🏗
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version-file: '.nvmrc'

      - name: Install dependencies 👨🏻‍💻
        run: npm ci

      - name: Generate migrations 🗃️
        run: npm run db:generate
        env:
          STUBIDP_DATABASE_DIALECT: ${{ matrix.dialect }}
          STUBIDP_DATABASE_URL: ${{ matrix.dialect == 'postgresql' && 'postgresql://postgres:postgres@localhost:5432/stubidp' || '' }}

  docker-lint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Lint Dockerfile 🐳
        uses: cerberauth/ci/actions/docker-lint@main
