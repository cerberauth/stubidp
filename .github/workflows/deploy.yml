name: deploy

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci

      - name: Resolve deployment config
        id: config
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "worker_name=stubidp-pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "db_name=stubidp-db-pr" >> "$GITHUB_OUTPUT"
          else
            echo "worker_name=stubidp" >> "$GITHUB_OUTPUT"
            echo "db_name=stubidp-db" >> "$GITHUB_OUTPUT"
          fi

      - name: Provision D1 database
        id: provision-db
        run: |
          DB_NAME="${{ steps.config.outputs.db_name }}"
          DB_ID=$(npx wrangler d1 list --json | jq -r --arg name "$DB_NAME" '.[] | select(.name==$name) | .uuid // empty')
          if [ -z "$DB_ID" ]; then
            echo "Creating D1 database $DB_NAME..."
            DB_ID=$(npx wrangler d1 create "$DB_NAME" --json | jq -r '.uuid')
          fi
          echo "db_id=$DB_ID" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply "${{ steps.config.outputs.db_name }}" --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name ${{ steps.config.outputs.worker_name }} --d1 DB=${{ steps.provision-db.outputs.db_id }}${{ vars.OIDC_ISSUER != '' && format(' --var OIDC_ISSUER:{0}', vars.OIDC_ISSUER) || '' }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Preview deployment\n\nDeployed to: ${{ steps.deploy.outputs.deployment-url }}`
            })
