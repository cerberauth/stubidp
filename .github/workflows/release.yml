name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish from (e.g. v1.2.3)'
        required: true
      skip:
        description: 'Comma-separated publishers to skip (aur,brew,chocolatey,docker,scoop,snapcraft,winget)'
        required: false
        default: ''
      only:
        description: 'Publish only to this publisher — skips all others (aur,brew,chocolatey,docker,scoop,snapcraft,winget)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      packages: write
      pull-requests: write

    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - run: git fetch --force --tags

      - name: Setup node env 🏗
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version-file: '.nvmrc'

      - name: Install dependencies 👨🏻‍💻
        run: npm ci

      - name: Setup Bun 🥟
        uses: oven-sh/setup-bun@v2

      - name: Release 🚀
        uses: cerberauth/ci/actions/releaser@main
        with:
          setup-go: 'false'
          package-name: stubidp
          skip: ${{ inputs.skip }}
          only: ${{ inputs.only }}
          goreleaser-current-tag: ${{ inputs.tag }}
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
          snapcraft-store-credentials: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          chocolatey-api-key: ${{ secrets.CHOCOLATEY_API_KEY }}
          aur-key: ${{ secrets.AUR_KEY }}
          github-token: ${{ secrets.PAT }}

  npm-publish:
    needs: [release]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup node env 🏗
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Install dependencies 👨🏻‍💻
        run: npm ci

      - name: Set version
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version

      - name: Build TypeScript 🔨
        run: npm run build

      - name: Publish to npm 📦
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup node env for GitHub Packages 🏗
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://npm.pkg.github.com

      - name: Publish to GitHub Packages 📦
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
