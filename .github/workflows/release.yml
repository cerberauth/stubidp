name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v6

      - name: Setup node env 🏗
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version-file: ".nvmrc"

      - name: Install dependencies 👨🏻‍💻
        run: npm ci

      - name: Build
        run: npm run build

      - name: Get version from release tag
        id: get_version
        run: echo "VERSION=${{ github.ref_name }}" | sed 's/v//' >> $GITHUB_OUTPUT

      - name: Update package.json version
        run: npm version ${{ steps.get_version.outputs.VERSION }} --no-git-tag-version

      - name: Commit and push package.json
        run: |
          git config --global user.email "github-actions-bot@github.com"
          git config --global user.name "github-actions"
          git add package.json
          git commit -m "Update package.json to version ${{ steps.get_version.outputs.VERSION }}"
          git push origin main

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm run publish --ignore-scripts

      - name: Create Docker Image name
        id: create-image-name
        run: |
          echo "image=ghcr.io/${{ github.repository }}:${{ steps.get_version.outputs.VERSION }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.get_version.outputs.VERSION }},ghcr.io/${{ github.repository }}:latest
          cache-from: type=registry,ref=${{ steps.create-image-name.outputs.image }}
          cache-to: type=inline

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ github.repository_owner }}/${{ github.repository }}:${{ steps.get_version.outputs.VERSION }},${{ github.repository_owner }}/${{ github.repository }}:latest
          cache-from: type=registry,ref=${{ steps.create-image-name.outputs.image }}
          cache-to: type=inline
