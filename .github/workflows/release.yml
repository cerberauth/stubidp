name: Release

on:
  release:
    types: [published]

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Get version from release tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

  release-docker:
    needs: get-version
    uses: ./.github/workflows/release-docker.yml
    with:
      version: ${{ needs.get-version.outputs.version }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  release-npm:
    needs: get-version
    uses: ./.github/workflows/release-npm.yml
    with:
      version: ${{ needs.get-version.outputs.version }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-sea:
    uses: ./.github/workflows/release-sea.yml
    secrets:
      HOMEBREW_GITHUB_TOKEN: ${{ secrets.HOMEBREW_GITHUB_TOKEN }}
      CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
      WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
      SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

  verify-release:
    name: Verify Release
    runs-on: ubuntu-latest
    needs: [release-npm, get-version]

    permissions:
      contents: write
      packages: read

    steps:
      - name: Wait for registry propagation ⏳
        run: sleep 30

      - name: Verify npm package 📋
        run: |
          echo "Verifying @cerberauth/stubidp@${{ needs.get-version.outputs.version }} on npm..."
          npm view @cerberauth/stubidp@${{ needs.get-version.outputs.version }}
          echo "✅ Package found on npm registry"

      - name: Verify GitHub Packages 📋
        run: |
          echo "Verifying @cerberauth/stubidp@${{ needs.get-version.outputs.version }} on GitHub Packages..."
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > .npmrc
          echo "@cerberauth:registry=https://npm.pkg.github.com" >> .npmrc
          npm view @cerberauth/stubidp@${{ needs.get-version.outputs.version }}
          echo "✅ Package found on GitHub Packages Registry"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Test installation 🧪
        run: |
          echo "Testing package installation..."
          mkdir test-install
          cd test-install
          npm init -y
          npm install @cerberauth/stubidp@${{ needs.get-version.outputs.version }}
          echo "✅ Package successfully installed"

          # Test CLI command
          npx stubidp --version || echo "⚠️  CLI command returned non-zero exit code (may be expected)"

      - name: Update Release Notes 📝
        if: success()
        uses: actions/github-script@v8
        with:
          script: |
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: context.ref.replace('refs/tags/', '')
            });

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              body: release.data.body + '\n\n✅ **Release verified and published successfully**\n\n- npm: https://www.npmjs.com/package/@cerberauth/stubidp\n- GitHub Packages: https://github.com/cerberauth/stubidp/pkgs/npm/stubidp\n- Docker (GHCR): https://github.com/cerberauth/stubidp/pkgs/container/stubidp\n- Docker Hub: https://hub.docker.com/r/cerberauth/stubidp'
            });
