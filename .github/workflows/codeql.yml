name: "CodeQL"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: '31 7 * * 3'

permissions:
  contents: read

jobs:
  analyze:
    uses: cerberauth/ci/.github/workflows/typescript-codeql.yml@main
    with:
      config-file: .github/codeql/codeql-config.yml
      source-root: src
